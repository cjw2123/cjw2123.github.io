<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67 카운터</title>
<style>
  :root{
    --bg:#0a0a0d; --lime:#c8ff4d; --orange:#ff5a1f;
    --ink:#f4f1ea; --mute:#6b6b75; --line:#23232b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,system-ui,"Segoe UI",sans-serif;min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:20px 16px 40px;}
  h1{font-family:"Arial Black",Impact,sans-serif;font-weight:900;
    font-size:clamp(28px,8vw,40px);letter-spacing:-1px;margin:0 0 4px;
    display:flex;align-items:baseline;gap:10px;}
  h1 span{color:var(--lime);}
  .ticker{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:var(--mute);letter-spacing:.5px;text-transform:uppercase;
    margin-bottom:18px;min-height:14px;}

  .stage{position:relative;width:100%;aspect-ratio:4/3;background:#000;
    border-radius:14px;overflow:hidden;border:1px solid var(--line);}
  video,canvas.overlay{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;transform:scaleX(-1);}
  video{display:block;}
  canvas.overlay{pointer-events:none;}
  .countdown{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-family:"Arial Black",Impact,sans-serif;
    font-weight:900;font-size:120px;color:var(--lime);background:rgba(0,0,0,.55);z-index:3;}
  .hint{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;text-align:center;padding:24px;font-size:13px;
    color:var(--mute);z-index:2;}
  .hidden{display:none!important;}

  .timebar{position:absolute;top:0;left:0;right:0;height:4px;
    background:rgba(255,255,255,.1);z-index:2;}
  .timebar-fill{height:100%;width:100%;background:var(--lime);
    transition:width .15s linear;}
  .timelabel{position:absolute;top:8px;right:10px;z-index:2;
    font-family:ui-monospace,monospace;font-size:12px;color:var(--ink);
    background:rgba(0,0,0,.55);padding:3px 8px;border-radius:6px;}

  .scoreboard{display:flex;align-items:center;justify-content:space-between;
    margin:18px 0 12px;padding:18px 20px;background:#111114;
    border:1px solid var(--line);border-radius:14px;position:relative;}
  .count{font-family:"Arial Black",Impact,sans-serif;font-weight:900;
    font-size:clamp(56px,18vw,84px);color:var(--lime);line-height:1;transition:transform .08s;}
  .count.pulse{transform:scale(1.15) skewX(-4deg);}
  @media (prefers-reduced-motion:reduce){.count.pulse{transform:none;}}
  .count-label{font-family:ui-monospace,monospace;font-size:11px;color:var(--mute);
    letter-spacing:1px;text-align:right;}
  .count-label b{display:block;color:var(--ink);font-size:22px;font-family:ui-monospace,monospace;}
  .newbest{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    background:var(--orange);color:#0a0a0d;font-size:10px;font-weight:800;
    letter-spacing:1px;padding:3px 10px;border-radius:20px;}

  .controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  button{flex:1;min-width:110px;padding:13px;border:none;border-radius:10px;
    font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  #startBtn{background:var(--lime);color:#0a0a0d;}
  #stopBtn{background:var(--orange);color:#0a0a0d;}
  button:disabled{opacity:.3;cursor:not-allowed;}

  .filerow{display:flex;align-items:center;gap:8px;margin-bottom:18px;
    font-size:12px;color:var(--mute);}
  .filerow input{flex:1;font-size:12px;color:var(--mute);}

  .history{font-family:ui-monospace,monospace;font-size:12px;}
  .history h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--mute);margin:0 0 8px;font-weight:600;}
  .history ul{list-style:none;margin:0;padding:0;}
  .history li{display:flex;justify-content:space-between;padding:7px 0;
    border-bottom:1px solid var(--line);color:var(--mute);}
  .history li b{color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <h1>67 <span>COUNTER</span></h1>
  <div class="ticker" id="ticker">모델 로딩 중…</div>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas class="overlay" id="overlay"></canvas>
    <div class="timebar hidden" id="timebar"><div class="timebar-fill" id="timebarFill"></div></div>
    <div class="timelabel hidden" id="timelabel">0:00</div>
    <div class="hint" id="hint">모델 로딩 중… 잠깐 기다려</div>
    <div class="countdown hidden" id="countdown"></div>
  </div>

  <div class="scoreboard">
    <div class="newbest hidden" id="newbest">NEW BEST</div>
    <div class="count" id="count">0</div>
    <div class="count-label">BEST<b id="best">0</b></div>
  </div>

  <div class="controls">
    <button id="startBtn" disabled>시작</button>
    <button id="stopBtn" disabled>정지</button>
  </div>

  <div class="filerow">
    🎵 <input type="file" id="audioFile" accept="audio/*">
    <span id="audioHint">(선택, 직접 가진 음원)</span>
  </div>

  <div class="history">
    <h2>기록</h2>
    <ul id="historyList"><li>아직 기록 없음</li></ul>
  </div>
</div>
<audio id="audio"></audio>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video=document.getElementById('video');
const overlay=document.getElementById('overlay');
const octx=overlay.getContext('2d');
const countEl=document.getElementById('count');
const bestEl=document.getElementById('best');
const newbestEl=document.getElementById('newbest');
const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');
const countdownEl=document.getElementById('countdown');
const hintEl=document.getElementById('hint');
const audioFile=document.getElementById('audioFile');
const audio=document.getElementById('audio');
const audioHint=document.getElementById('audioHint');
const timebar=document.getElementById('timebar');
const timebarFill=document.getElementById('timebarFill');
const timelabel=document.getElementById('timelabel');
const historyList=document.getElementById('historyList');
const tickerEl=document.getElementById('ticker');

// ---- tunables ----
const SMOOTH=0.4;        // y smoothing per hand
const PROM=0.045;        // min vertical swing (normalized 0..1) to register a stroke
const MIN_INTERVAL_MS=200;

const facts=[
  "기원: 2025년 3월 농구 경기 영상 손짓",
  "딕셔너리닷컴 2025 올해의 단어",
  "라멜로 볼 키 6'7\"에서도 영향",
  "의미는 없음. 그게 포인트"
];
let fi=0; setInterval(()=>{fi=(fi+1)%facts.length;tickerEl.textContent=facts[fi];},3500);

let handLandmarker=null, stream=null, running=false, lastVideoTime=-1;
let count=0, best=0, runIsBest=false, timeLimit=null;
const hands={};
function newHandState(){return {smoothY:null,anchorY:null,dir:'down',last:0};}
function fmt(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); const sec=s%60;
  return `${m}:${String(sec).padStart(2,'0')}`; }

async function init(){
  try{
    const fileset=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    handLandmarker=await HandLandmarker.createFromOptions(fileset,{
      baseOptions:{modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"},
      numHands:2, runningMode:"VIDEO"
    });
    tickerEl.textContent=facts[0];
    hintEl.textContent="카메라 권한 켜고 시작 버튼 ㄱㄱ";
    startBtn.disabled=false;
  }catch(e){
    hintEl.textContent="모델 로드 실패. 인터넷 / https 환경인지 확인.";
    tickerEl.textContent="error"; console.error(e);
  }
}

async function loadBest(){
  try{const r=await window.storage.get('six-seven-best');best=r?parseInt(r.value):0;}
  catch(e){best=0;}
  bestEl.textContent=best;
}
async function loadHistory(){
  try{const r=await window.storage.get('six-seven-history');
    renderHistory(r?JSON.parse(r.value):[]);}catch(e){}
}
function renderHistory(h){
  historyList.innerHTML=h.length
    ? h.slice(0,8).map(x=>`<li><span>${x.date}</span><b>${x.score}</b></li>`).join('')
    : '<li>아직 기록 없음</li>';
}
async function saveRun(score){
  try{
    const r=await window.storage.get('six-seven-history').catch(()=>null);
    const h=r?JSON.parse(r.value):[];
    h.unshift({date:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),score});
    await window.storage.set('six-seven-history',JSON.stringify(h.slice(0,20)));
    renderHistory(h);
    if(score>best){best=score;await window.storage.set('six-seven-best',String(best));bestEl.textContent=best;}
  }catch(e){console.error(e);}
}

async function startCamera(){
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
  video.srcObject=stream; await video.play();
  overlay.width=video.videoWidth; overlay.height=video.videoHeight;
}

audioFile.addEventListener('change',()=>{
  if(!audioFile.files[0]){ timeLimit=null; audioHint.textContent='(선택, 직접 가진 음원)'; return; }
  audio.src=URL.createObjectURL(audioFile.files[0]);
  audio.addEventListener('loadedmetadata',()=>{
    timeLimit = isFinite(audio.duration) ? audio.duration : null;
    audioHint.textContent = timeLimit ? `제한시간 ${fmt(timeLimit)}` : '(선택, 직접 가진 음원)';
  },{once:true});
});

audio.addEventListener('timeupdate',()=>{
  if(!running || !timeLimit) return;
  const left = timeLimit - audio.currentTime;
  timelabel.textContent = fmt(left);
  timebarFill.style.width = Math.max(0,(left/timeLimit)*100) + '%';
});
audio.addEventListener('ended',()=>{ if(running) stopRun(); });

function resetRun(){
  count=0; runIsBest=false; countEl.textContent='0';
  newbestEl.classList.add('hidden');
  for(const k in hands) delete hands[k];
}

function bumpCount(){
  count++; countEl.textContent=count;
  countEl.classList.remove('pulse'); void countEl.offsetWidth; countEl.classList.add('pulse');
  if(count>best && !runIsBest){ runIsBest=true; newbestEl.classList.remove('hidden'); }
  if(runIsBest){ best=count; bestEl.textContent=best; }
}

// count only the UP stroke, per hand
function feedHand(label, y, t){
  if(!hands[label]) hands[label]=newHandState();
  const s=hands[label];
  s.smoothY = s.smoothY==null ? y : s.smoothY*(1-SMOOTH)+y*SMOOTH;
  if(s.anchorY==null) s.anchorY=s.smoothY;
  const cur=s.smoothY;
  if(s.dir==='down'){                  // waiting for upward move (y decreasing)
    if(cur>s.anchorY) s.anchorY=cur;   // track bottom (max y)
    else if(s.anchorY-cur>PROM){       // moved up enough -> COUNT
      if(t-s.last>MIN_INTERVAL_MS){ bumpCount(); s.last=t; }
      s.dir='up'; s.anchorY=cur;
    }
  }else{                               // waiting for downward move to re-arm
    if(cur<s.anchorY) s.anchorY=cur;   // track top (min y)
    else if(cur-s.anchorY>PROM){ s.dir='down'; s.anchorY=cur; }
  }
}

function drawBox(lm,label){
  let minx=1,miny=1,maxx=0,maxy=0;
  for(const p of lm){minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);
    maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);}
  const W=overlay.width,H=overlay.height,pad=0.03;
  const x=(minx-pad)*W,y=(miny-pad)*H,w=(maxx-minx+2*pad)*W,h=(maxy-miny+2*pad)*H;
  octx.strokeStyle='#c8ff4d'; octx.lineWidth=3; octx.strokeRect(x,y,w,h);
  octx.fillStyle='#c8ff4d';
  octx.save(); octx.scale(-1,1);       // un-mirror label text
  octx.font='700 16px ui-monospace,monospace';
  octx.fillText(label,-(x+w)+4,y-6);
  octx.restore();
}

function loop(){
  if(!running) return;
  const t=performance.now();
  if(video.currentTime!==lastVideoTime){
    lastVideoTime=video.currentTime;
    const res=handLandmarker.detectForVideo(video,t);
    octx.clearRect(0,0,overlay.width,overlay.height);
    const seen=new Set();
    if(res.landmarks){
      for(let i=0;i<res.landmarks.length;i++){
        const lm=res.landmarks[i];
        const label=res.handedness?.[i]?.[0]?.categoryName || ('H'+i);
        seen.add(label);
        drawBox(lm,label);
        feedHand(label, lm[0].y, t);   // landmark 0 = wrist
      }
    }
    for(const k in hands) if(!seen.has(k)) delete hands[k];
  }
  requestAnimationFrame(loop);
}

function countdown(n){
  return new Promise(res=>{
    countdownEl.classList.remove('hidden'); countdownEl.textContent=n;
    if(n<=0){countdownEl.classList.add('hidden');res();return;}
    setTimeout(()=>countdown(n-1).then(res),1000);
  });
}

startBtn.addEventListener('click',async()=>{
  startBtn.disabled=true; hintEl.classList.add('hidden');
  try{ if(!stream) await startCamera(); }
  catch(e){ hintEl.classList.remove('hidden');
    hintEl.textContent='카메라 권한 거부됨. 브라우저 설정 확인.'; startBtn.disabled=false; return; }
  resetRun();
  await countdown(3);
  running=true; stopBtn.disabled=false; lastVideoTime=-1;
  if(timeLimit){
    timebar.classList.remove('hidden'); timelabel.classList.remove('hidden');
    timebarFill.style.width='100%'; timelabel.textContent=fmt(timeLimit);
  }else{
    timebar.classList.add('hidden'); timelabel.classList.add('hidden');
  }
  if(audio.src){audio.currentTime=0;audio.play().catch(()=>{});}
  requestAnimationFrame(loop);
});

function stopRun(){
  running=false; audio.pause();
  octx.clearRect(0,0,overlay.width,overlay.height);
  timebar.classList.add('hidden'); timelabel.classList.add('hidden');
  stopBtn.disabled=true; startBtn.disabled=false;
  saveRun(count);
}
stopBtn.addEventListener('click', stopRun);

loadBest(); loadHistory(); init();
</script>
</body>
</html>
